<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rentabilidad — Smash Club</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Passion+One:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" crossorigin="anonymous"></script>
<style>
:root{--am:#f6d01e;--vl:#412d7d;--vd:#6ebd89;--bg:#0e0b1a;--sf:#1a1530;--sf2:#231d3e;--bd:#2e2655;--tx:#e8e4f0;--mt:#7a6fa0;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--tx);font-size:13px;}
.hdr{background:var(--vl);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;border-bottom:3px solid var(--am);}
.logo-t{font-family:'Passion One',sans-serif;font-weight:700;font-size:28px;color:#fff;letter-spacing:1px;line-height:1;}
.logo-t span{color:var(--am);}
.logo-s{font-family:'Passion One',sans-serif;font-weight:400;font-size:11px;letter-spacing:3px;color:rgba(255,255,255,.45);text-transform:uppercase;margin-top:2px;}
.kpis{display:flex;gap:10px;flex-wrap:wrap;}
.kpi{text-align:center;background:rgba(0,0,0,.25);border-radius:8px;padding:7px 12px;border:1px solid rgba(255,255,255,.08);}
.kv{font-family:'Passion One',sans-serif;font-weight:700;font-size:24px;line-height:1;}
.kv.am{color:var(--am);} .kv.vd{color:var(--vd);} .kv.wh{color:#fff;}
.kl{font-size:9px;color:rgba(255,255,255,.4);margin-top:2px;text-transform:uppercase;letter-spacing:.8px;}
.hm{font-size:10px;color:rgba(255,255,255,.28);text-align:right;line-height:1.7;}
.tabs{display:flex;background:var(--sf);border-bottom:2px solid var(--bd);padding:0 12px;gap:2px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tab{padding:10px 14px;cursor:pointer;font-family:'Passion One',sans-serif;font-weight:400;font-size:13px;letter-spacing:1px;color:var(--mt);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;text-transform:uppercase;white-space:nowrap;}
.tab.active{color:var(--am);border-bottom-color:var(--am);}
.tab:hover:not(.active){color:var(--tx);}
.panel{display:none;padding:12px;}
.panel.active{display:block;}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.cgrid.one{grid-template-columns:1fr;}
.cc{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:12px;height:240px;}
@media(max-width:640px){.cgrid{grid-template-columns:1fr;}.cc{height:200px;}}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:8px;border:1px solid var(--bd);}
table{width:100%;border-collapse:collapse;min-width:600px;}
thead th{background:var(--sf2);color:var(--mt);font-family:'Passion One',sans-serif;font-weight:400;font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:9px 10px;text-align:right;border-bottom:2px solid var(--am);white-space:nowrap;}
thead th:first-child{text-align:left;position:sticky;left:0;background:var(--sf2);z-index:1;}
td{padding:7px 10px;border-bottom:1px solid var(--bd);text-align:right;vertical-align:middle;}
td:first-child{text-align:left;font-weight:600;color:#fff;position:sticky;left:0;background:var(--bg);z-index:1;}
tr:hover td{background:var(--sf2);}
tr:hover td:first-child{background:var(--sf2);}
.fr td{background:var(--sf)!important;color:var(--am);font-family:'Passion One',sans-serif;font-weight:400;font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:5px 10px;border-top:1px solid var(--vl);}
.fr td:first-child{background:var(--sf)!important;}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-family:'Passion One',sans-serif;font-weight:400;font-size:13px;letter-spacing:.5px;}
.bvd{background:rgba(110,189,137,.15);color:var(--vd);border:1px solid rgba(110,189,137,.3);}
.bam{background:rgba(246,208,30,.12);color:var(--am);border:1px solid rgba(246,208,30,.25);}
.brj{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.25);}
.rb{display:inline-flex;align-items:center;gap:6px;justify-content:flex-end;}
.rt{background:var(--bd);border-radius:3px;height:6px;width:50px;overflow:hidden;}
.rf{height:100%;border-radius:3px;}
.pb{display:inline-flex;align-items:center;gap:5px;justify-content:flex-end;}
.pt{background:var(--bd);border-radius:2px;height:4px;width:36px;overflow:hidden;}
.pf{height:100%;background:var(--vl);border-right:1px solid var(--am);border-radius:2px;}
.pl{color:var(--mt);font-size:11px;}
.nota{font-size:10px;color:var(--mt);font-style:italic;}
.nm{color:var(--mt);} .nw{color:#fff;font-weight:600;} .nv{color:var(--vd);} .na{color:var(--am);}
.dok{color:var(--vd);font-size:11px;} .dwrn{color:var(--am);font-size:11px;} .dbd{color:#f87171;font-size:11px;}
/* EVOLUCION */
.evo-header{background:rgba(255,255,255,.05);border-radius:10px;padding:14px 18px;margin-bottom:16px}
.evo-title{font-family:'Passion One',sans-serif;font-size:18px;letter-spacing:1px;color:#f6d01e}
.evo-sub{font-size:11px;color:#7a6fa0;margin-top:3px}
.evo-chart-wrap{height:220px;margin-bottom:20px}
.evo-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(min-width:560px){.evo-grid{grid-template-columns:repeat(4,1fr)}}
.evo-card{background:#1a1535;border-radius:10px;padding:12px 10px;border-top:2px solid #412d7d}
.evo-card.up{border-top-color:#e8342a}
.evo-card.down{border-top-color:#6ebd89}
.evo-card.flat{border-top-color:#412d7d}
.evo-name{font-size:10px;color:#7a6fa0;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.evo-val{font-family:'Passion One',sans-serif;font-size:20px;color:#e8e4f0}
.evo-unit{font-size:9px;color:#7a6fa0;margin-bottom:4px}
.evo-history{font-size:10px;color:#a09abf}
.evo-badge-up{color:#e8342a;font-weight:bold}
.evo-badge-dn{color:#6ebd89;font-weight:bold}
.evo-badge-fl{color:#7a6fa0}
.ev-badge .label{font-size:10px;color:var(--mt);text-transform:uppercase;letter-spacing:.8px;}
.ev-badge .val{font-family:'Passion One',sans-serif;font-size:20px;color:var(--am);}

.aumento{color:var(--vd);font-weight:600;} .sin-cambio{color:var(--mt);} .baja{color:#f87171;font-weight:600;}
@media(max-width:480px){.logo-t{font-size:22px;}.kpis{gap:6px;}.kv{font-size:20px;}.hdr{padding:10px 12px;}.panel{padding:8px;}}
</style>
</head>
<body>

<div class="hdr">

<div class="tabs">

<div class="panel active" id="panel-local">

</div>
<div class="panel" id="panel-py">
  <div class="cgrid one"><div class="cc" style="height:220px;"><canvas id="ch-py"></canvas></div></div>
  <div class="tbl-wrap"><table id="tp"></table></div>
</div>
<div class="panel" id="panel-extras"><div class="tbl-wrap"><table id="te"></table></div></div>
<div class="panel" id="panel-ing"><div class="tbl-wrap"><table id="ti"></table></div></div>
<div class="panel" id="panel-evo">

  <div class="evo-chart-wrap">
    <canvas id="ch-evo-bar"></canvas>
  </div>
  <div class="evo-grid" id="evo-cards"></div>
</div>

const TABS=['local','py','extras','ing','evo'];
function showTab(t){
  TABS.forEach(id=>{

  });
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active',el.textContent.trim()===

// Helpers
const AM='#f6d01e', VL='#6ebd89', VD='#412d7d';
function rc(r){return r>=65?VL:r>=55?AM:'#e8342a';}
function fmt(n){return n.toLocaleString('es-AR',{minimumFractionDigits:0,maximumFractionDigits:0});}
function pct(n,b){return b?((n-b)/b*100):0;}
function pctStr(n,b){const p=pct(n,b);const s=(p>0?'+':'')+p.toFixed(1)+'%';return `<span style="color:${p>0?'#e8342a':p<0?'#6ebd89':'#888'}">${s}</span>`;}

// ─── EVOLUCIÓN PRECIOS INSUMOS ─────────────────────────────────────────────
(()=>{
  const PH = D.price_history || [];
  if (!PH.length) return;

  // Bar chart: % variación total
  const labels=[], changes=[], bgColors=[], bdColors=[];
  PH.forEach(item=>{
    const pts=item.data;
    labels.push(item.label);
    if(pts.length<2){ changes.push(0); bgColors.push('#41307799'); bdColors.push('#412d7d'); return; }
    const first=pts[0].valor, last=pts[pts.length-1].valor;
    const chg=parseFloat(((last-first)/first*100).toFixed(1));
    changes.push(chg);
    bgColors.push(chg>0.1?'#e8342a88':chg<-0.1?'#6ebd8988':'#41307799');
    bdColors.push(chg>0.1?'#e8342a':chg<-0.1?'#6ebd89':'#412d7d');
  });
  const chEvo = document.getElementById('ch-evo-bar');
  if(chEvo) new Chart(chEvo,{
    type:'bar',
    data:{labels,datasets:[{label:'Variación %',data:changes,backgroundColor:bgColors,
      borderColor:bdColors,borderWidth:1,borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',
      plugins:{legend:{display:false},
        title:{display:true,text:'Variación de Costos de Insumos vs. medición anterior — '+D.csv_fecha,color:'#e8e4f0',font:{size:11,weight:'bold'}},
        tooltip:{callbacks:{label:ctx=>(ctx.raw>0?'+':'')+ctx.raw+'%'}}},
      scales:{
        x:{ticks:{color:'#7a6fa0',font:{size:10},callback:v=>(v>0?'+':'')+v+'%'},grid:{color:'#2e2655'}},
        y:{ticks:{color:'#7a6fa0',font:{size:10}},grid:{color:'#2e2655'}}}}});

  // Cards por insumo
  const grid=document.getElementById('evo-cards');
  if(!grid) return;
  let html='';
  PH.forEach(item=>{
    const pts=item.data;
    if(!pts.length) return;
    const last=pts[pts.length-1];
    const first=pts[0];
    const chg=pts.length>1?parseFloat(((last.valor-first.valor)/first.valor*100).toFixed(1)):0;
    const cls=chg>0.1?'up':chg<-0.1?'down':'flat';
    const arrow=chg>0.1?'▲':chg<-0.1?'▼':'—';
    const chgColor=chg>0.1?'#e8342a':chg<-0.1?'#6ebd89':'#888';
    const chgStr=chg===0?'<span style="color:#888">Sin cambio</span>'
      :`<span style="color:${chgColor};font-weight:bold">${arrow} ${chg>0?'+':''}${chg}%</span>`;
    const fmtVal=v=>v>=10000?'$'+Math.round(v).toLocaleString('es-AR'):'$'+v.toFixed(2);
    const histRows=pts.map((p,i)=>`<div style="color:${i===pts.length-1?'#e8e4f0':'#7a6fa0'}">${p.fecha}: ${fmtVal(p.valor)}</div>`).join('');
    html+=`<div class="evo-card ${cls}">
      <div class="evo-name">${item.label}</div>
      <div class="evo-val">${fmtVal(last.valor)}</div>
      <div class="evo-unit">${item.unidad}</div>
      <div class="evo-history" style="margin:6px 0">${histRows}</div>
      <div style="font-size:11px">${chgStr}</div>
    </div>`;
  });
  grid.innerHTML=html;
})();

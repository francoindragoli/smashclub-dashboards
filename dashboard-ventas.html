*{box-sizing:border-box;margin:0;padding:0}

.mes-btn.active{background:var(--yellow);color:var(--purple);border-color:var(--yellow)}
.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:14px 14px 0}
.kpi.wide{grid-column:1/-1}

.kpi{background:var(--card);border-radius:12px;padding:14px 10px;text-align:center;border-top:3px solid var(--purple);box-shadow:0 1px 5px rgba(0,0,0,.07)}

.kl{font-size:10px;color:#999;margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.tab-bar{display:flex;gap:8px;padding:14px 14px 0;flex-wrap:wrap}
.tab-btn{flex:1;min-width:90px;background:var(--card);border:2px solid var(--border);border-radius:8px;padding:11px 8px;font-size:13px;font-weight:700;color:#999;cursor:pointer;text-align:center;-webkit-tap-highlight-color:transparent;transition:.2s}
.tab-btn.active{background:var(--purple);border-color:var(--purple);color:#fff}
.tab-pane{display:none;padding:14px}
.tab-pane.active{display:block}
.section{background:var(--card);border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 1px 5px rgba(0,0,0,.07)}
.stitle{font-family:'Passion One',sans-serif;font-size:15px;color:var(--purple);letter-spacing:1px;margin-bottom:12px;text-transform:uppercase;border-bottom:2px solid var(--yellow);padding-bottom:6px}
.g2{display:grid;grid-template-columns:1fr;gap:14px}
@media(min-width:560px){.g2{grid-template-columns:1fr 1fr}}
.g3{display:grid;grid-template-columns:1fr;gap:14px}
@media(min-width:560px){.g3{grid-template-columns:repeat(3,1fr)}}
.ch-wrap{position:relative}
.ch-wrap.h300{height:300px}.ch-wrap.h220{height:220px}.ch-wrap.h180{height:180px}.ch-wrap.h160{height:160px}

.footer{text-align:center;padding:24px;color:#bbb;font-size:11px}

function buildFormasPago(prefix, fp) {
  const sec = document.getElementById(prefix+'-pagos-section');
  if(!fp||!Object.keys(fp).length){if(sec)sec.style.display='none';return;}
  if(sec)sec.style.display='block';
  const sorted=Object.entries(fp).sort((a,b)=>b[1]-a[1]);

function barVentas(id,labels,values,color){
  makeChart(id,{type:'bar',data:{labels,datasets:[{data:values,backgroundColor:color||C.purple,borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' $'+(ctx.parsed.y/1e6).toFixed(2)+'M'}}},
      scales:{x:{ticks:{color:'#666',font:{size:10}}},y:{ticks:{callback:v=>'$'+(v/1e6).toFixed(0)+'M',color:'#888',font:{size:9}},grid:{color:'rgba(0,0,0,.05)'}}}}});
}
function lineHora(id,labels,values,color){
  makeChart(id,{type:'line',data:{labels,datasets:[{data:values,borderColor:color||C.purple,backgroundColor:(color||C.purple)+'22',fill:true,tension:0.4,pointRadius:3,pointBackgroundColor:color||C.purple}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` $${ctx.parsed.y.toFixed(2)}M`}}},
      scales:{x:{ticks:{color:'#666',font:{size:9},maxRotation:45}},y:{ticks:{callback:v=>'$'+v.toFixed(1)+'M',color:'#888',font:{size:9}},grid:{color:'rgba(0,0,0,.05)'}}}}});
}
function updateKPIs(){
  const m=MESES[currentMes],c=m.ciudad,p=m.puntilla;
  let totalB,totalV,totalDocs,tabLabel;
  if(currentTab==='ciudad'){totalB=c.total;totalV=c.ventaTotal;totalDocs=c.totalDocs||0;tabLabel='Ciudad';}
  else if(currentTab==='puntilla'){totalB=p.total;totalV=p.ventaTotal;totalDocs=p.totalDocs||0;tabLabel='La Puntilla';}
  else{totalB=c.total+p.total;totalV=c.ventaTotal+p.ventaTotal;totalDocs=(c.totalDocs||0)+(p.totalDocs||0);tabLabel='Ambos locales';}
  const diasRef=currentTab==='ciudad'?(c.diasLaborales||m.dias):currentTab==='puntilla'?(p.diasLaborales||m.dias):m.dias;
  const ticket=totalDocs>0?Math.round(totalV/totalDocs):Math.round(totalV/totalB);
  const ticketLabel=totalDocs>0?'Ticket promedio':'Precio prom/burger';
  document.getElementById('kpis').innerHTML=`
    <div class="kpi g"><div class="kv">${fmt(totalV)}</div><div class="kl">Facturacion total</div></div>
    <div class="kpi y"><div class="kv">${fmt(Math.round(totalV/diasRef))}</div><div class="kl">Facturacion / dia</div></div>
    <div class="kpi"><div class="kv">${fmt(ticket)}</div><div class="kl">${ticketLabel}</div></div>
    <div class="kpi"><div clas="kv">${fmtN(totalB)}</div><div class="kl">Burgers totales</div></div>
    <div class="kpi wide g"><div class="kv">${Math.round(totalB/diasRef)}</div><div class="kl">Burgers / dia</div></div>`;
  document.getElementById('footer-info').textContent=`Smash Club - Mendoza - ${m.label} - ${m.dias} dias - ${tabLabel}`;
}
function buildCiudad(){
  const loc=MESESAcurrentMes].ciudad;
  barH('c-burg',Object.keys(loc.burgers),Object.values(loc.burgers),C.purple);
  if(loc.jr>0||loc.doble>0||loc.xl>0){donut('c-tam',['JR','Doble','XL'],[loc.jr,loc.doble,loc.xl],[C.green,C.purple,C.yellow]);document.getElementById('c-tam-note').textContent=`JR ${loc.jr} - Doble ${loc.doble} - XL ${loc.xl}`;}
  const ac=loc.acompanante,acTotal=Object.values(ac).reduce((a,b)=>a+b,0);
  if(acTotal>0){const acKeys=Object.keys(ac).filter(k=>ac[k]>0);donut('c-acomp',acKeys,acKeys.map(k=>ac[k]),[C.purple,C.yellow,C.green]);document.getElementById('c-acomp-note').textContent=`Con Papas ${ac['Con Papas']} - Sin Papas ${ac['Sin Papas']}`;}
  else document.getElementById('c-acomp-note').textContent='Dato no disponible en este export';
  const pan=loc.pan;;donut('c-pan',['Pan Regular','Pan Sin Gluten'],[pan['Pan Regular'],pan['Pan Sin Gluten']],[C.purple,C.green]);document.getElementById('c-pan-note').textContent=`Regular ${pan['Pan Regular']} - Sin Gluten ${pan['Pan Sin Gluten']}`;
  if(loc.salsa){const s=loc.salsa;donut('c-salsa',['Salsa CDL','Cebolla Caramelizada','Sin Salsa'],[s['Salsa CDL'],s['Cebolla Caramelizada'],s['Sin Salsa / Otra']],[C.purple,C.yellow,C.teal]);document.getElementById('c-salsa-wrap').style.display='block';document.getElementById('c-salsa-empty').style.display='none';}
  else{document.getElementById('c-salsa-wrap').style.display='none';document.getElementById('c-salsa-empty').style.display='block';}
  barVentas('c-dias',DIAS_LABELS,loc.ventaDias,C.purple);lineHora('c-hora',loc.horaLabels,loc.horaVentas,C.purple);
  const bk=Object.keys(loc.biggie||{});
  if(bk.length>0){barH('c-biggie',bk,bk.map(k=>loc.biggie[k]),C.green);document.getElementById('c-biggie-wrap').style.display='block';document.getElementById('c-biggie-empty').style.display='none';}
  else{document.getElementById('c-biggie-wrap').style.display='none';document.getElementById('c-biggie-empty').style.display='block';}
  buildFormasPago('c',loc.formasPago);
}
function buildPuntilla(){
  const loc=MESESAcurrentMes].puntilla;
  barH('p-burg',Object.keys(loc.burgers),Object.values(loc.burgers),'#5c4ba0');
  if(!loc.sizes_incomplete&&(loc.jr>0||loc.doble>0)){donut('p-tam',['JR','Doble','XL'],[loc.jr,loc.doble,loc.xl],[C.green,C.purple,C.yellow]);document.getElementById('p-tam-note').textContent=`JR ${loc.jr} - Doble ${loc.doble} - XL ${loc.xl}`;document.getElementById('p-tam-wrap').style.display='block';document.getElementById('p-tam-empty').style.display='none';}
  else{document.getElementById('p-tam-wrap').style.display='none';document.getElementById('p-tam-empty').style.display='block';}
  const ac=loc.acompanante,acTotal=Object.values(ac).reduce((a,b)=>a+b,0);
  if(acTotal>0){const acKeys=Object.keys(ac).filter(k=>ac[k]>0);donut('p-acomp',acKeys,acKeys.map(k=>ac[k]),[C.purple,C.yellow,C.green]);document.getElementById('p-acomp-wrap').style.display='block';document.getElementById('p-acomp-empty').style.display='none';}
  else{document.getElementById('p-acomp-wrap').style.display='none';document.getElementById('p-acomp-empty').style.display='block';}
  const pan=loc.pan;
  if(pan['Pan Regular']>0||pan['Pan Sin Gluten']>0){donut('p-pan',['Pan Regular','Pan Sin Gluten'],[pan['Pan Regular'],pan['Pan Sin Gluten']],[C.purple,C.green]);document.getElementById('p-pan-wrap').style.display='block';document.getElementById('p-pan-empty').style.display='none';}
  else{document.getElementById('p-pan-wrap').style.display='none';document.getElementById('p-pan-empty').style.display='block';}
  if(loc.salsa){const s=loc.salsa;donut('p-salsa',['Salsa CDL','Cebolla Caramelizada','Sin Salsa'],[s['Salsa CDL'],s['Cebolla Caramelizada'],s['Sin Salsa / Otra']],[C.purple,C.yellow,C.teal]);document.getElementById('p-salsa-wrap').style.display='block';document.getElementById('p-salsa-empty').style.display='none';}
  else{document.getElementById('p-salsa-wrap').style.display='none';document.getElementById('p-salsa-empty').style.display='block';}
  barVentas('p-dias',DIAS_LABELS,loc.ventaDias,'#5c4ba0');lineHora('p-hora',loc.horaLabels,loc.horaVentas,'#5c4ba0');
  const bk=Object.keys(loc.biggie||{});
  if(bk.length>0){barH('p-biggie',bk,bk.map(k=>loc.biggie[k]),C.green);document.getElementById('p-biggie-wrap').style.display='block';document.getElementById('p-biggie-empty').style.display='none';}
  else{document.getElementById('p-biggie-wrap').style.display='none';document.getElementById('p-biggie-empty').style.display='block';}
  buildFormasPago('p',loc.formasPago);
}
function buildConsolidado(){
  const m=MESES[currentMes],c=m.ciudad,p=m.puntilla;
  const allB={};Object.entries(c.burgers).forEach(([k,v])=>{allB[k]=(allB[k]||0)+v;});Object.entries(p.burgers).forEach(([k,v])=>{allB[k]=(allB[k]||0)+v;});
  barH('k-burg',Object.keys(allB),Object.values(allB),C.purple);
  makeChart('k-dias',{type:'bar',data:{labels:DIAS_LABELS,datasets:[{label:'Ciudad',data:c.ventaDias,backgroundColor:C.purple,borderRadius:3},{label:'Puntilla',data:p.ventaDias,backgroundColor:C.green,borderRadius:3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10},padding:8,boxWidth:10}},tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label}: $${(ctx.parsed.y/1e6).toFixed(2)}M`}}},
      scales:{x:{ticks:{color:'#666',font:{size:9}}},y:{ticks:{callback:v=>'$'+(v/1e6).toFixed(0)+'M',color:'#888',font:{size:9}},grid:{color:'rgba(0,0,0,.05)'}}}}});
  const cHMap={},pHMap={};c.horaLabels.forEach((l,i)=>{cHMap[l]=c.horaVentas[i];});p.horaLabels.forEach((l,i)=>{pHMap[l]=p.horaVentas[i];});
  const allHL=[...new Set([...c.horaLabels,...p.horaLabels])].sort((a,b)=>{const na=parseInt(a),nb=parseInt(b);return(na<9?na+24:na)-(nb<9?nb+24:nb);});
  lineHora('k-hora',allHL,allHL.map(l=>(cHMap[l]||0)+(pHMap[l]||0)),C.purple);
  if(!m.puntilla.sizes_incomplete){const jrT=c.jr+p.jr,dobleT=c.doble+p.doble,xlT=c.xl+p.xl;donut('k-tam',['JR','Doble','XL'],[jrT,dobleT,xlT],[C.green,C.purple,C.yellow]);document.getElementById('k-tam-note').textContent=`JR ${jrT} - Doble ${dobleT} - XL ${xlT}`;document.getElementById('k-tam-wrap').style.display='block';}
  else{document.getElementById('k-tam-note').textContent='TamaÃ±os de La Puntilla no disponibles para este mes.';document.getElementById('ktam-wrap').style.display='none';}
  buildFormasPagoConsolidado(c,p);
}
function buildTab(tab){if(tab==='ciudad')buildCiudad();else if(tab==='puntilla')buildPuntilla();else buildConsolidado();}
function switchTab(tab,btn){
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');btn.classList.add('active');currentTab=tab;updateKPIs();buildTab(tab);
}
function changeMes(key){
  currentMes=key;document.querySelectorAll('.mes-btn').forEach(b=>b.classList.toggle('active',b.dataset.mes===key));
  Object.keys(charts).forEach(id=>{try{charts[id].destroy()}catch(e){}});charts={};updateKPIs();buildTab(currentTab);
}
function init(){
  document.getElementById('mesBar').innerHTML=Object.entries(MESES).map(([key,m])=>`<button class="mes-btn${key===currentMes?' active':''}" data-mes="${key}" onclick="changeMes('${key}')">${m.label}</button>`).join('');
  updateKPIs();buildCiudad();
}
document.addEventListener('DOMContentLoaded',init);
<\/script>
